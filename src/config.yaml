site:
  name: CodeStackHub
  site: 'https://codestackhub.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

metadata:
  title:
    default: CodeStackHub
    template: '%s — CodeStackHub'
  description: 'Senior engineer. Production-grade tradeoffs. Show actual code patterns. No marketing fluff.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: CodeStackHub
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@codestackhub'
    site: '@codestackhub'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true
    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: true
    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
